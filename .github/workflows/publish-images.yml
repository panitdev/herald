name: Publish Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-images.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "bun.lock"
      - "crates/**"
      - "packages/ui/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  UI_IMAGE: ui
  API_IMAGE: api
  STROPHED_BUILD: ${{ github.run_number }}

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image_namespace=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/ui/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_namespace }}/${{ env.UI_IMAGE }}:latest
            ${{ steps.meta.outputs.image_namespace }}/${{ env.UI_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: crates/api
          file: crates/api/Dockerfile
          push: true
          build-args: |
            STROPHED_BUILD=${{ env.STROPHED_BUILD }}
          tags: |
            ${{ steps.meta.outputs.image_namespace }}/${{ env.API_IMAGE }}:latest
            ${{ steps.meta.outputs.image_namespace }}/${{ env.API_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
