name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  production:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Typecheck UI
        run: bun run --cwd ui lint

      - name: Build UI
        run: bun run --cwd ui build

      - name: Apply D1 migrations
        run: bun run db:migrate:remote

      - name: Deploy API Worker
        run: bun run deploy:api

      - name: Deploy email Worker
        run: bun run deploy:email

      - name: Deploy queue Worker
        run: bun run deploy:queue

      - name: Deploy UI Worker
        run: bun run deploy:ui
