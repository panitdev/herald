name: Build API

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "api/**"
  pull_request:
    paths:
      - ".github/workflows/build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "api/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  check:
    name: Cargo check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --locked -p api

  build:
    name: Build and push API image
    needs:
      - check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image_namespace=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_namespace }}/api:latest
            ${{ steps.meta.outputs.image_namespace }}/api:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
