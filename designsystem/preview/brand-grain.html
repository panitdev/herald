<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 12px; padding: 0; }
  .strip { flex: 1; display: flex; align-items: center; padding: 22px 28px; }
  .plain { background: var(--panit-background); }
  .grain-on { background: var(--panit-background); }
  .grain-on::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.35;
    mix-blend-mode: multiply;
    background-image: radial-gradient(oklch(0.8 0.02 85 / 0.35) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  .row { display: flex; height: 100%; min-height: 220px; flex-direction: column; }
  .strip { position: relative; flex: 1; }
  .strip__lbl { font-family: var(--panit-font-mono); font-size: 11px; color: var(--panit-muted-foreground); }
  .strip__txt { font-family: var(--panit-font-serif); font-style: italic; font-weight: 500; font-size: 22px; letter-spacing: -0.01em; color: var(--panit-foreground); margin-top: 4px; }
  .strip__txt em { color: var(--panit-primary); }
  .divider { height: 1px; background: var(--panit-border); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="strip plain"><div><div class="strip__lbl">no grain — pure --background</div><div class="strip__txt">Build agents that <em>do the busywork.</em></div></div></div>
    <div class="divider"></div>
    <div class="strip grain-on"><div><div class="strip__lbl">with grain — paper feel, applied to every full-bleed shell</div><div class="strip__txt">Build agents that <em>do the busywork.</em></div></div></div>
  </div>
</div>
</body></html>
