<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 0; padding: 0; background: var(--panit-sidebar); height: 100%; }
  .pad { padding: 14px 12px; display: flex; flex-direction: column; gap: 2px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13.5px; color: var(--panit-muted-foreground); position: relative; cursor: pointer; }
  .item--active { background: var(--panit-sidebar-accent); color: var(--panit-foreground); font-weight: 500; }
  .item--active::before { content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px; border-radius: 2px; background: var(--panit-primary); }
  .item--active .ico { color: var(--panit-primary); }
  .item:hover:not(.item--active) { background: color-mix(in oklab, var(--panit-sidebar-accent) 60%, transparent); color: var(--panit-foreground); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; color: currentColor; }
  .section { font-size: 10.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: color-mix(in oklab, var(--panit-muted-foreground) 70%, transparent); padding: 12px 14px 4px; }
  .new { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; border: 1px dashed var(--panit-sidebar-border); color: var(--panit-muted-foreground); font-size: 13px; margin-top: 4px; }
  .new:hover { border-color: oklch(0.48 0.24 264 / 0.6); background: var(--panit-primary-10); color: var(--panit-primary); }
</style></head><body>
<div class="card grain-bg">
  <div class="pad">
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</div>
    <div class="item item--active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Sessions</div>
    <div class="section">Apps</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12 2 13l2 9 9-2"/><path d="m14.5 9.5 2 2-3 3-2-2z"/><path d="M11 14H4v8h7z"/><path d="m18 2 4 4-9 9-4-1-1-4z"/></svg>Task Completion Reports</div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Attendance Log</div>
    <div class="new"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"/></svg>New app</div>
  </div>
</div>
</body></html>
