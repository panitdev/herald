<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 26px 28px; gap: 12px; }
  .flow { background: linear-gradient(135deg, oklch(0.48 0.24 264 / 0.08), var(--panit-background) 50%, oklch(0.82 0.13 75 / 0.10)); border-radius: 14px; padding: 20px 18px; position: relative; overflow: hidden; }
  .flow::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(var(--panit-border) 1px, transparent 1px), linear-gradient(90deg, var(--panit-border) 1px, transparent 1px); background-size: 24px 24px; opacity: 0.35; mask-image: radial-gradient(ellipse at 70% 30%, black 40%, transparent 75%); -webkit-mask-image: radial-gradient(ellipse at 70% 30%, black 40%, transparent 75%); pointer-events: none; }
  .step { position: relative; display: flex; align-items: center; gap: 12px; background: oklch(0.995 0.008 85 / 0.85); border: 1px solid var(--panit-border); border-radius: 12px; padding: 10px 12px; backdrop-filter: blur(4px); }
  .step + .step { margin-top: 6px; }
  .tile { width: 32px; height: 32px; border-radius: 8px; background: var(--panit-primary-10); color: var(--panit-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .meta { flex: 1; min-width: 0; }
  .meta__title { font-size: 13px; font-weight: 500; color: var(--panit-foreground); }
  .meta__tag { font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--panit-muted-foreground); }
  .check { color: var(--panit-primary); }
  .arrow { display: flex; justify-content: center; padding: 1px 0; color: color-mix(in oklab, var(--panit-muted-foreground) 60%, transparent); }
</style></head><body>
<div class="card">
  <div class="kicker">Workflow step — used in WorkflowShowcase + builder</div>
  <div class="flow">
    <div class="step">
      <div class="tile"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></div>
      <div class="meta"><div class="meta__title">New support email arrives</div><div class="meta__tag">Trigger</div></div>
      <svg class="check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
    </div>
    <div class="arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg></div>
    <div class="step">
      <div class="tile"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg></div>
      <div class="meta"><div class="meta__title">Agent extracts order ID &amp; intent</div><div class="meta__tag">LLM step</div></div>
      <svg class="check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
    </div>
  </div>
</div>
</body></html>
