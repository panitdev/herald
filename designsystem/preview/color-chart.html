<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 12px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .swatch__chip { box-shadow: inset 0 0 0 1px oklch(0.18 0.06 264 / 0.08); }
</style></head><body>
<div class="card">
  <div class="kicker">Chart palette — cobalt, amber, sky, periwinkle, navy</div>
  <div class="grid">
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.48 0.24 264); border-color: transparent;"></div><div class="swatch__name">chart-1 · cobalt</div><div class="swatch__val">0.48 0.24 264</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.82 0.13 75); border-color: transparent;"></div><div class="swatch__name">chart-2 · amber</div><div class="swatch__val">0.82 0.13 75</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.62 0.10 200); border-color: transparent;"></div><div class="swatch__name">chart-3 · sky</div><div class="swatch__val">0.62 0.10 200</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.72 0.08 280); border-color: transparent;"></div><div class="swatch__name">chart-4 · periwinkle</div><div class="swatch__val">0.72 0.08 280</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.35 0.10 264); border-color: transparent;"></div><div class="swatch__name">chart-5 · navy</div><div class="swatch__val">0.35 0.10 264</div></div>
  </div>
</div>
</body></html>
