<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 18px; justify-content: center; }
  .headline { font-family: var(--panit-font-serif); font-weight: 500; font-size: 44px; line-height: 1.05; letter-spacing: -0.01em; text-wrap: balance; max-width: 560px; }
  .em { font-style: italic; color: var(--panit-primary); }
  .anno { font-family: var(--panit-font-mono); font-size: 11px; color: var(--panit-muted-foreground); line-height: 1.5; }
</style></head><body>
<div class="card">
  <div class="kicker">Signature italic accent</div>
  <div class="headline">Build agents that <span class="em">do the busywork</span> for your team.</div>
  <div class="headline">Give your team back their <span class="em">afternoons.</span></div>
  <div class="anno">Serif italic, weight 500, color: var(--panit-primary). One phrase per headline.</div>
</div>
</body></html>
