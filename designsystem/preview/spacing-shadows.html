<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 18px; padding: 30px; }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 100px; height: 64px; border-radius: 12px; background: var(--panit-card); border: 1px solid var(--panit-border); }
  .name { font-size: 11px; color: var(--panit-muted-foreground); text-align: center; }
  .val { font-family: var(--panit-font-mono); font-size: 10px; color: var(--panit-foreground); text-align: center; }
</style></head><body>
<div class="card">
  <div class="kicker">Shadow system — restrained, ink-tinted; CTA gets a green-tinted glow</div>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow: none;"></div><div class="name">none</div><div class="val">flat</div></div>
    <div class="item"><div class="box" style="box-shadow: 0 1px 2px oklch(0.18 0.06 264 / 0.05);"></div><div class="name">xs</div><div class="val">1px / 2 / 5%</div></div>
    <div class="item"><div class="box" style="box-shadow: 0 1px 3px oklch(0.18 0.06 264 / 0.08), 0 1px 2px oklch(0.18 0.06 264 / 0.05);"></div><div class="name">sm · default card</div><div class="val">1 / 3 / 8%</div></div>
    <div class="item"><div class="box" style="box-shadow: 0 12px 32px -12px oklch(0.18 0.06 264 / 0.25);"></div><div class="name">popover</div><div class="val">12 / 32 / 25%</div></div>
    <div class="item"><div class="box" style="box-shadow: 0 14px 40px oklch(0 0 0 / 0.06);"></div><div class="name">prompt box</div><div class="val">14 / 40 / 6%</div></div>
    <div class="item"><div class="box" style="background: var(--panit-primary); border-color: transparent; box-shadow: 0 6px 18px -10px oklch(0.48 0.24 264 / 0.50);"></div><div class="name">primary CTA</div><div class="val">soft green glow</div></div>
  </div>
</div>
</body></html>
