<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 14px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .box { background: var(--panit-card); border: 1px solid var(--panit-border); box-shadow: 0 1px 3px oklch(0.18 0.06 264 / 0.08); }
  .name { font-size: 11px; color: var(--panit-muted-foreground); }
  .val { font-family: var(--panit-font-mono); font-size: 10.5px; color: var(--panit-foreground); }
</style></head><body>
<div class="card">
  <div class="kicker">Border radii — default 12px (the body of the system)</div>
  <div class="row">
    <div class="item"><div class="box" style="width: 80px; height: 56px; border-radius: 6px;"></div><div class="name">sm</div><div class="val">6px</div></div>
    <div class="item"><div class="box" style="width: 80px; height: 56px; border-radius: 8px;"></div><div class="name">md</div><div class="val">8px</div></div>
    <div class="item"><div class="box" style="width: 80px; height: 56px; border-radius: 10px;"></div><div class="name">lg</div><div class="val">10px</div></div>
    <div class="item"><div class="box" style="width: 80px; height: 56px; border-radius: 12px; outline: 2px dashed var(--panit-primary); outline-offset: 4px;"></div><div class="name">default</div><div class="val">12px</div></div>
    <div class="item"><div class="box" style="width: 80px; height: 56px; border-radius: 16px;"></div><div class="name">xl</div><div class="val">16px</div></div>
    <div class="item"><div class="box" style="width: 80px; height: 56px; border-radius: 28px;"></div><div class="name">prompt</div><div class="val">28px</div></div>
    <div class="item"><div class="box" style="width: 56px; height: 56px; border-radius: 999px;"></div><div class="name">full</div><div class="val">9999px</div></div>
  </div>
</div>
</body></html>
