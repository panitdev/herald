<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 18px; justify-content: center; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .btn { position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 500; font-family: var(--panit-font-sans); cursor: pointer; border: 1px solid transparent; transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1), background 150ms, border-color 150ms; }
  .btn--primary { background: var(--panit-primary); color: var(--panit-primary-foreground); box-shadow: 0 6px 18px -10px oklch(0.48 0.24 264 / 0.50); }
  .btn--primary:hover { background: oklch(0.43 0.22 264); transform: translateY(-1px); box-shadow: 0 10px 22px -10px oklch(0.48 0.24 264 / 0.55); }
  .btn--outline { background: var(--panit-card); color: var(--panit-foreground); border-color: var(--panit-border); }
  .btn--outline:hover { border-color: color-mix(in oklab, var(--panit-foreground) 30%, transparent); transform: translateY(-1px); }
  .btn--ghost { background: transparent; color: var(--panit-foreground); }
  .btn--ghost:hover { background: var(--panit-muted); }
  .btn:active { transform: scale(0.97); }
  .arrow { width: 14px; height: 14px; }
  .label { font-family: var(--panit-font-mono); font-size: 10.5px; color: var(--panit-muted-foreground); margin-top: 6px; }
</style></head><body>
<div class="card">
  <div class="kicker">PulseButton — primary CTA, outline secondary, ghost</div>
  <div class="row">
    <button class="btn btn--primary">Get started free <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
    <button class="btn btn--outline">I already have an account</button>
    <button class="btn btn--ghost">Skip for now</button>
  </div>
  <div class="label">hover: y -1px · tap: scale 0.97 · spring 600/30</div>
  <div class="row" style="margin-top: 4px;">
    <button class="btn btn--primary" disabled style="opacity:0.5;cursor:not-allowed;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      Working...
    </button>
    <button class="btn btn--outline" disabled style="opacity:0.5;cursor:not-allowed;">Disabled</button>
  </div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body></html>
