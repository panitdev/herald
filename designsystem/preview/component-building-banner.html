<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px 28px; gap: 12px; justify-content: center; }
  .banner { position: relative; overflow: hidden; border: 1px dashed oklch(0.48 0.24 264 / 0.40); background: oklch(0.48 0.24 264 / 0.04); border-radius: 12px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
  .tile { width: 36px; height: 36px; border-radius: 10px; background: var(--panit-primary-10); color: var(--panit-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; animation: wiggle 4s ease-in-out infinite; }
  @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(12deg); } 50% { transform: rotate(0deg); } 75% { transform: rotate(-8deg); } }
  .head { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
  .title { font-size: 13.5px; color: var(--panit-foreground); }
  .title em { font-family: var(--panit-font-serif); font-style: italic; font-weight: 400; }
  .pct { font-size: 13px; font-weight: 500; color: var(--panit-primary); font-variant-numeric: tabular-nums; }
  .sub { font-size: 11px; color: var(--panit-muted-foreground); margin-top: 2px; }
  .track { height: 6px; border-radius: 999px; background: var(--panit-border); overflow: hidden; margin-top: 10px; }
  .bar { height: 100%; background: var(--panit-primary); border-radius: 999px; width: 60%; animation: fill 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  @keyframes fill { from { width: 0; } to { width: 60%; } }
</style></head><body>
<div class="card">
  <div class="kicker">"Building" banner — dashed primary border, sparkle that wiggles</div>
  <div class="banner">
    <div class="tile"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg></div>
    <div style="flex:1; min-width: 0;">
      <div class="head">
        <div class="title">Building <em>Task Completion Reports</em>...</div>
        <span class="pct">60%</span>
      </div>
      <div class="sub">Step 3 of 5 — your teammate invite link will be ready in a moment.</div>
      <div class="track"><div class="bar"></div></div>
    </div>
  </div>
</div>
</body></html>
