<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 14px; justify-content: center; }
  .field { width: 100%; max-width: 460px; }
  .lbl { font-size: 13px; font-weight: 500; color: color-mix(in oklab, var(--panit-foreground) 80%, transparent); margin-bottom: 6px; display: block; }
  .req { color: var(--panit-accent-foreground); margin-left: 2px; opacity: 0.7; }
  .input-wrap { display: flex; align-items: center; border: 1px solid var(--panit-border); border-radius: 10px; background: var(--panit-card); transition: all 200ms; }
  .input-wrap.focus { border-color: var(--panit-primary); box-shadow: 0 0 0 4px oklch(0.48 0.24 264 / 0.10); }
  .input-wrap input { flex: 1; border: none; outline: none; background: transparent; padding: 10px 12px; font-size: 15px; font-family: var(--panit-font-sans); color: var(--panit-foreground); }
  .icon { padding-left: 12px; color: var(--panit-primary); display: flex; }
  .ok { width: 20px; height: 20px; border-radius: 999px; background: var(--panit-primary); color: white; display: flex; align-items: center; justify-content: center; margin-right: 10px; }
  .meta { font-family: var(--panit-font-mono); font-size: 10.5px; color: var(--panit-muted-foreground); }
</style></head><body>
<div class="card">
  <div class="kicker">AnimatedField — focus ring, validation pop, blur-only errors</div>
  <div class="field">
    <label class="lbl">Work email <span class="req">*</span></label>
    <div class="input-wrap focus">
      <span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
      <input value="alex@fieldwork.co" />
      <span class="ok"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
    </div>
    <div class="meta" style="margin-top: 6px;">focused · valid · spring 500/22</div>
  </div>
</div>
</body></html>
