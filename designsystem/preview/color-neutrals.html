<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch__chip { box-shadow: inset 0 0 0 1px oklch(0.18 0.06 264 / 0.08); }
</style></head><body>
<div class="card">
  <div class="kicker">Neutral surfaces — warm cream, deep navy ink</div>
  <div class="grid">
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.985 0.012 85)"></div><div class="swatch__name">Background</div><div class="swatch__val">0.985 0.012 85</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.995 0.008 85)"></div><div class="swatch__name">Card / Popover</div><div class="swatch__val">0.995 0.008 85</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.97 0.012 85)"></div><div class="swatch__name">Sidebar</div><div class="swatch__val">0.97 0.012 85</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.955 0.015 85)"></div><div class="swatch__name">Muted / Secondary</div><div class="swatch__val">0.955 0.015 85</div></div>
  </div>
  <div class="kicker" style="margin-top: 6px;">Type tones</div>
  <div class="grid">
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.18 0.06 264)"></div><div class="swatch__name">Foreground · ink</div><div class="swatch__val">0.18 0.06 264</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.50 0.06 260)"></div><div class="swatch__name">Muted FG</div><div class="swatch__val">0.50 0.06 260</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.90 0.015 85)"></div><div class="swatch__name">Border</div><div class="swatch__val">0.90 0.015 85</div></div>
    <div class="swatch"><div class="swatch__chip" style="background: oklch(0.92 0.012 85)"></div><div class="swatch__name">Input</div><div class="swatch__val">0.92 0.012 85</div></div>
  </div>
</div>
</body></html>
