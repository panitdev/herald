<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .row .lbl { width: 110px; flex-shrink: 0; }
  .h-hero { font-family: var(--panit-font-serif); font-weight: 500; font-size: 60px; line-height: 1; letter-spacing: -0.01em; }
  .h-1 { font-family: var(--panit-font-serif); font-weight: 500; font-size: 48px; line-height: 1.05; letter-spacing: -0.01em; }
  .h-2 { font-family: var(--panit-font-serif); font-weight: 500; font-size: 36px; line-height: 1.05; letter-spacing: -0.01em; }
  .h-3 { font-family: var(--panit-font-serif); font-weight: 500; font-size: 30px; line-height: 1.2; letter-spacing: -0.01em; }
  .meta { font-family: var(--panit-font-mono); font-size: 10.5px; color: var(--panit-muted-foreground); }
</style></head><body>
<div class="card">
  <div class="kicker">Display — Noto Serif KR · weight 500 · tight tracking</div>
  <div class="row"><span class="h-hero">Build agents</span><span class="meta">60 / 1.02 — hero</span></div>
  <div class="row"><span class="h-1">Good to see you</span><span class="meta">48 / 1.05 — H1</span></div>
  <div class="row"><span class="h-2">Workspace settings</span><span class="meta">36 / 1.05 — H2</span></div>
  <div class="row"><span class="h-3">Current flow</span><span class="meta">30 / 1.2 — H3</span></div>
</div>
</body></html>
