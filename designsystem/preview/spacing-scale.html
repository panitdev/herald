<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 12px; }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .bar { background: var(--panit-primary); height: 14px; border-radius: 4px; }
  .lbl { font-family: var(--panit-font-mono); font-size: 10.5px; color: var(--panit-muted-foreground); }
  .name { font-size: 11px; color: var(--panit-foreground); }
</style></head><body>
<div class="card">
  <div class="kicker">Spacing — Tailwind 4px scale; common values</div>
  <div class="row">
    <div class="item"><div class="bar" style="width: 4px;"></div><div class="name">1</div><div class="lbl">4px</div></div>
    <div class="item"><div class="bar" style="width: 8px;"></div><div class="name">2</div><div class="lbl">8px</div></div>
    <div class="item"><div class="bar" style="width: 12px;"></div><div class="name">3</div><div class="lbl">12px</div></div>
    <div class="item"><div class="bar" style="width: 16px;"></div><div class="name">4 · card pad</div><div class="lbl">16px</div></div>
    <div class="item"><div class="bar" style="width: 20px;"></div><div class="name">5 · panel pad</div><div class="lbl">20px</div></div>
    <div class="item"><div class="bar" style="width: 24px;"></div><div class="name">6 · page pad</div><div class="lbl">24px</div></div>
    <div class="item"><div class="bar" style="width: 32px;"></div><div class="name">8 · page pad lg</div><div class="lbl">32px</div></div>
    <div class="item"><div class="bar" style="width: 40px;"></div><div class="name">10</div><div class="lbl">40px</div></div>
    <div class="item"><div class="bar" style="width: 56px;"></div><div class="name">14</div><div class="lbl">56px</div></div>
  </div>
  <div style="font-family:var(--panit-font-mono);font-size:11px;color:var(--panit-muted-foreground);margin-top:4px;">page · max-w-3xl in-app · max-w-7xl marketing</div>
</div>
</body></html>
