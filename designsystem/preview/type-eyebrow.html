<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 16px; justify-content: center; }
  .eb { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: var(--panit-primary); }
  .eb-muted { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: color-mix(in oklab, var(--panit-muted-foreground) 90%, transparent); }
  .sl { font-family: var(--panit-font-serif); font-size: 26px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.1; }
  .anno { font-family: var(--panit-font-mono); font-size: 10.5px; color: var(--panit-muted-foreground); }
</style></head><body>
<div class="card">
  <div class="kicker">Eyebrow caps — letter-spacing 0.14em, weight 500</div>
  <div>
    <div class="eb">For worker-team managers</div>
    <div class="sl" style="margin-top: 6px;">Build agents that <span style="font-style:italic;color:var(--panit-primary)">do the busywork.</span></div>
  </div>
  <div>
    <div class="eb">Live example</div>
    <div class="sl" style="margin-top: 6px;">Describe it once. <span style="font-style:italic;color:var(--panit-primary)">Panit</span> runs it forever.</div>
  </div>
  <div>
    <div class="eb-muted">Recent sessions</div>
    <div class="anno" style="margin-top:4px">muted variant — used as in-sidebar section labels, 0.12em tracking</div>
  </div>
</div>
</body></html>
