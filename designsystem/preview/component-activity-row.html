<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 14px; }
  .item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; }
  .item--sub { background: oklch(0.48 0.24 264 / 0.10); }
  .item--sys { background: oklch(0.82 0.13 75 / 0.15); }
  .av { width: 28px; height: 28px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .av--p { background: var(--panit-primary-10); color: var(--panit-primary); }
  .av--a { background: oklch(0.82 0.13 75 / 0.2); color: oklch(0.45 0.10 60); }
  .line { flex: 1; min-width: 0; font-size: 13.5px; color: var(--panit-foreground); }
  .line span.q { color: var(--panit-muted-foreground); }
  .time { font-family: var(--panit-font-mono); font-variant-numeric: tabular-nums; font-size: 11px; color: var(--panit-muted-foreground); }
</style></head><body>
<div class="card">
  <div class="kicker">Activity row — avatar tile (primary or accent) + person · what</div>
  <div>
    <div class="item">
      <div class="av av--p">JC</div>
      <div class="line"><strong style="font-weight: 500;">Jamie Chen</strong> <span class="q">· submitted a task report</span></div>
      <span class="time">14:32</span>
    </div>
    <div class="item">
      <div class="av av--p">YL</div>
      <div class="line"><strong style="font-weight: 500;">Yuna Lee</strong> <span class="q">· logged attendance</span></div>
      <span class="time">13:55</span>
    </div>
    <div class="item">
      <div class="av av--a"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg></div>
      <div class="line"><strong style="font-weight: 500;">Panit</strong> <span class="q">· workflow roll-up completed</span></div>
      <span class="time">13:21</span>
    </div>
  </div>
</div>
</body></html>
