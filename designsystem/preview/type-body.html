<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .lbl { width: 92px; flex-shrink: 0; font-family: var(--panit-font-mono); font-size: 10.5px; color: var(--panit-muted-foreground); }
  .b-base { font-size: 15px; line-height: 1.6; color: var(--panit-foreground); }
  .b-sm { font-size: 13px; line-height: 1.5; color: var(--panit-muted-foreground); }
  .b-xs { font-size: 11px; color: var(--panit-muted-foreground); }
  .label { font-size: 13px; font-weight: 500; color: color-mix(in oklab, var(--panit-foreground) 80%, transparent); }
  .eyebrow { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: var(--panit-primary); }
</style></head><body>
<div class="card">
  <div class="kicker">Body & UI — Pretendard sans · brand-loaded (Regular 400)</div>
  <div class="row"><span class="lbl">eyebrow</span><span class="eyebrow">For worker-team managers</span></div>
  <div class="row"><span class="lbl">label</span><span class="label">Email</span></div>
  <div class="row"><span class="lbl">body 15</span><span class="b-base">Panit connects your tools and runs your repetitive work on autopilot.</span></div>
  <div class="row"><span class="lbl">small 13</span><span class="b-sm">Saved your team ~14 hrs this week.</span></div>
  <div class="row"><span class="lbl">meta 11</span><span class="b-xs">© 2026 Panit Labs · Privacy · Terms</span></div>
</div>
</body></html>
