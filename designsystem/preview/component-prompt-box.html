<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 12px; padding: 26px 28px; justify-content: center; }
  .box { border-radius: 28px; border: 1px solid oklch(0 0 0 / 0.08); background: oklch(1 0 0 / 0.96); box-shadow: 0 14px 40px oklch(0 0 0 / 0.06); padding: 18px 22px; backdrop-filter: blur(6px); }
  .text { font-size: 15px; line-height: 1.6; color: var(--panit-foreground); min-height: 56px; }
  .placeholder { color: color-mix(in oklab, var(--panit-muted-foreground) 70%, transparent); }
  .ctrls { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .iconbtn { width: 36px; height: 36px; border-radius: 10px; background: transparent; color: var(--panit-muted-foreground); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
  .iconbtn:hover { background: oklch(0 0 0 / 0.04); color: var(--panit-foreground); }
  .right { display: flex; gap: 10px; align-items: center; }
  .model { font-size: 13px; color: var(--panit-muted-foreground); }
  .send { width: 36px; height: 36px; border-radius: 10px; background: var(--panit-foreground); color: var(--panit-background); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
</style></head><body>
<div class="card">
  <div class="kicker">Agent prompt box — 28px radius, soft drop shadow, 96% white</div>
  <div class="box">
    <div class="text"><span>Summarize last week's support tickets and post a digest to #ops every Monday at 9am.</span></div>
    <div class="ctrls">
      <button class="iconbtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.93 8.8l-8.58 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
      <div class="right">
        <span class="model">Sonnet 4.6</span>
        <button class="send"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 3 9-3 9 19-9Z"/><path d="M6 12h16"/></svg></button>
      </div>
    </div>
  </div>
</div>
</body></html>
