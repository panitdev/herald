<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { gap: 14px; justify-content: center; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 500; border: 1px solid transparent; }
  .pill--live { background: oklch(0.48 0.24 264 / 0.10); color: var(--panit-primary); border-color: oklch(0.48 0.24 264 / 0.30); }
  .pill--paused { background: var(--panit-muted); color: var(--panit-muted-foreground); border-color: var(--panit-border); }
  .dot-wrap { position: relative; width: 8px; height: 8px; }
  .ping { position: absolute; inset: 0; border-radius: 999px; opacity: 0.6; animation: ping 1.4s cubic-bezier(0, 0, 0.2, 1) infinite; }
  .dot { position: absolute; inset: 0; border-radius: 999px; }
  .dot--g { background: var(--panit-primary); }
  .ping--g { background: var(--panit-primary); }
  .dot--m { background: var(--panit-muted-foreground); }
  .dot--a { background: var(--panit-accent); }
  .ping--a { background: var(--panit-accent); }
  .dot--r { background: var(--panit-destructive); }
  .ping--r { background: var(--panit-destructive); }
  @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
  .lbl { font-size: 13px; color: var(--panit-foreground); }
  .anno { font-family: var(--panit-font-mono); font-size: 10.5px; color: var(--panit-muted-foreground); }
</style></head><body>
<div class="card">
  <div class="kicker">StatusDot + pill — ping halo for live/attention, no halo for paused</div>
  <div class="row">
    <span class="pill pill--live"><span class="dot-wrap"><span class="ping ping--g"></span><span class="dot dot--g"></span></span>Live</span>
    <span class="pill pill--paused"><span class="dot-wrap"><span class="dot dot--m" style="inset: 1px;"></span></span>Paused</span>
    <span class="lbl"><span class="dot-wrap" style="display:inline-block;vertical-align:middle;margin-right:8px;"><span class="ping ping--a"></span><span class="dot dot--a"></span></span>Needs attention</span>
    <span class="lbl"><span class="dot-wrap" style="display:inline-block;vertical-align:middle;margin-right:8px;"><span class="ping ping--r"></span><span class="dot dot--r"></span></span>Errors detected</span>
  </div>
  <div class="anno">animate-ping at 1.4s · ping color matches dot color · paused never pings</div>
</div>
</body></html>
