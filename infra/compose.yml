services:
  api:
    image: ${IMAGE_NAMESPACE:-ghcr.io/panitdev/herald}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-herald}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-herald}
      API_PORT: "8080"
      RUST_LOG: ${RUST_LOG:-info}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      KRATOS_PUBLIC_URL: ${KRATOS_PUBLIC_URL:?KRATOS_PUBLIC_URL is required}
      KRATOS_BROWSER_URL: ${KRATOS_BROWSER_URL:?KRATOS_BROWSER_URL is required}
      SNOWFLAKE_MACHINE_ID: ${SNOWFLAKE_MACHINE_ID:-1}
      SNOWFLAKE_NODE_ID: ${SNOWFLAKE_NODE_ID:-1}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-herald}
      POSTGRES_USER: ${POSTGRES_USER:-herald}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
